<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Premiere League</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #050505;
  color: white;
}

/* HEADER */
header {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  z-index: 1000;
  border-bottom: 1px solid red;
}

.logo {
  color: red;
  font-weight: bold;
}

/* MENU BUTTON */
.menu-btn {
  font-size: 24px;
  cursor: pointer;
}

/* SIDE MENU */
.menu {
  position: fixed;
  top: 0;
  right: -250px;
  width: 250px;
  height: 100%;
  background: #0a0a0a;
  transition: 0.3s;
  padding-top: 60px;
}

.menu a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
  border-bottom: 1px solid #111;
}

.menu a:hover {
  background: red;
}

/* HERO BANNER */
.banner {
  height: 400px;
  background: linear-gradient(to right, #000, #220000);
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  margin-top: 60px;
}

.banner h1 {
  font-size: 50px;
  color: red;
}

/* SECTION */
.section {
  padding: 60px 20px;
  text-align: center;
}

.card {
  background: #111;
  margin: 10px;
  padding: 20px;
  display: inline-block;
  width: 250px;
  border: 1px solid red;
}

.button {
  display: inline-block;
  margin-top: 15px;
  padding: 10px 20px;
  background: red;
  color: white;
  text-decoration: none;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: black;
}
</style>
</head>

<body>

<header>
  <div class="logo">CS PREMIERE LEAGUE</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="menu" id="menu">
  <a href="#">Home</a>
  <a href="#">Teams</a>
  <a href="#">Matches</a>
  <a href="#">Ranking</a>
</div>

<div class="banner">
  <h1>CS PREMIERE LEAGUE</h1>
</div>

<div class="section">
  <h2>Teams</h2>
  <div class="card">Team Alpha</div>
  <div class="card">Team Bravo</div>
</div>

<div class="section">
  <h2>Matches</h2>
  <div class="card">
    Team Alpha vs Team Bravo<br>
    <a class="button" href="#">Match starten</a>
  </div>
</div>

<footer>
  © 2026 CS Premiere League
</footer>

<script>
function toggleMenu() {
  let menu = document.getElementById("menu");
  if (menu.style.right === "0px") {
    menu.style.right = "-250px";
  } else {
    menu.style.right = "0px";
  }
}
</script>

</body>
</html>
