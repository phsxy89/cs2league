<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Premiere League</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0f1a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: #111827;
  font-size: 28px;
  font-weight: bold;
}

.hero {
  padding: 80px 20px;
  text-align: center;
  background: linear-gradient(180deg, #0b0f1a, #020617);
}

.hero h1 {
  font-size: 40px;
}

.button {
  display: inline-block;
  margin-top: 20px;
  padding: 12px 24px;
  background: #ff5500;
  color: white;
  text-decoration: none;
  border-radius: 8px;
}

.section {
  padding: 50px 20px;
  text-align: center;
}

.card {
  background: #111827;
  padding: 20px;
  margin: 10px;
  border-radius: 10px;
  display: inline-block;
  width: 250px;
}

footer {
  text-align: center;
  padding: 20px;
  background: #020617;
  font-size: 14px;
}
</style>
</head>

<body>

<header>CS PREMIERE LEAGUE</header>

<div class="hero">
  <h1>Die CS2 Liga für ambitionierte Spieler</h1>
  <a class="button" href="https://www.faceit.com/" target="_blank">
    Jetzt auf FACEIT spielen
  </a>
</div>

<div class="section">
  <h2>Teams</h2>
  
  <div class="card">Team Alpha</div>
  <div class="card">Team Bravo</div>
  <div class="card">Team Delta</div>
</div>

<div class="section">
  <h2>Matches</h2>
  <p>Alle Matches werden über FACEIT gespielt</p>

  <a class="button" href="#" target="_blank">Match ansehen</a>
</div>

<div class="section">
  <h2>Ranking</h2>
  <p>Coming soon...</p>
</div>

<footer>
  © CS Premiere League
</footer>

</body>
</html>
