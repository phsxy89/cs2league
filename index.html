<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Premiere League</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: black;
  color: white;
  overflow-x: hidden;
}

/* REDLINE ANIMATION */
body::before {
  content: "";
  position: fixed;
  width: 200%;
  height: 200%;
  background: repeating-linear-gradient(
    45deg,
    rgba(255,0,0,0.05) 0px,
    rgba(255,0,0,0.05) 2px,
    transparent 2px,
    transparent 20px
  );
  animation: moveLines 10s linear infinite;
  z-index: -1;
}

@keyframes moveLines {
  0% { transform: translate(0,0); }
  100% { transform: translate(-200px,-200px); }
}

/* HEADER */
header {
  position: fixed;
  width: 100%;
  top: 0;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  border-bottom: 1px solid red;
  z-index: 1000;
}

.logo {
  color: red;
  font-weight: bold;
}

/* MENU */
.menu-btn {
  font-size: 24px;
  cursor: pointer;
}

.menu {
  position: fixed;
  right: -260px;
  top: 0;
  width: 260px;
  height: 100%;
  background: #0a0a0a;
  transition: 0.4s;
  padding-top: 60px;
}

.menu a {
  display: block;
  padding: 15px;
  color: white;
  text-decoration: none;
  transition: 0.2s;
}

.menu a:hover {
  background: red;
  box-shadow: 0 0 10px red;
}

/* BANNER */
.banner {
  height: 450px;
  background: url("https://images.unsplash.com/photo-1606813907291-d86efa9b94db") center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  margin-top: 60px;
}

.banner h1 {
  font-size: 50px;
  color: red;
  text-shadow: 0 0 20px red;
}

/* SECTIONS */
.section {
  padding: 80px 20px;
  text-align: center;
}

/* TEAM CARDS */
.grid {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
}

.card {
  background: rgba(255,0,0,0.05);
  border: 1px solid red;
  margin: 10px;
  padding: 20px;
  width: 240px;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px red;
}

/* MATCH */
.match {
  background: #111;
  padding: 20px;
  margin: 10px auto;
  max-width: 400px;
  border: 1px solid red;
}

/* TABLE */
table {
  width: 90%;
  margin: auto;
  border-collapse: collapse;
}

th, td {
  padding: 10px;
  border-bottom: 1px solid red;
}

th {
  color: red;
}

/* BUTTON */
.button {
  display: inline-block;
  margin-top: 10px;
  padding: 10px 20px;
  background: red;
  color: white;
  text-decoration: none;
  box-shadow: 0 0 10px red;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: black;
}
</style>
</head>

<body>

<header>
  <div class="logo">CS PREMIERE LEAGUE</div>
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
</header>

<div class="menu" id="menu">
  <a href="#">Home</a>
  <a href="#teams">Teams</a>
  <a href="#matches">Matches</a>
  <a href="#ranking">Ranking</a>
</div>

<div class="banner">
  <h1>CS PREMIERE LEAGUE</h1>
</div>

<div class="section" id="teams">
  <h2>Teams</h2>
  <div class="grid">
    <div class="card">🔥 Team Alpha</div>
    <div class="card">⚡ Team Bravo</div>
    <div class="card">💀 Team Delta</div>
  </div>
</div>

<div class="section" id="matches">
  <h2>Matchplan</h2>

  <div class="match">
    Team Alpha vs Team Bravo<br>
    <a class="button" href="#">Match starten</a>
  </div>

  <div class="match">
    Team Delta vs Team Alpha<br>
    <a class="button" href="#">Match ansehen</a>
  </div>

</div>

<div class="section" id="ranking">
  <h2>Ranking</h2>

  <table>
    <tr>
      <th>Team</th>
      <th>Punkte</th>
    </tr>
    <tr>
      <td>Team Alpha</td>
      <td>6</td>
    </tr>
    <tr>
      <td>Team Bravo</td>
      <td>3</td>
    </tr>
  </table>

</div>

<footer>
  © 2026 CS Premiere League
</footer>

<script>
function toggleMenu() {
  let menu = document.getElementById("menu");
  menu.style.right = (menu.style.right === "0px") ? "-260px" : "0px";
}
</script>

</body>
</html>
