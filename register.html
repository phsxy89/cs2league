<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register Team</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <div class="nav">
    <img src="assets/logo.png" class="logo">

    <div class="menu">
      <a href="index.html">HOME</a>
      <a href="#">STANDINGS</a>
      <a href="#">SCHEDULE</a>
      <a href="#">TEAMS</a>
      <a href="#">PLAYOFFS</a>
      <a href="register.html">REGISTER</a>
    </div>
  </div>
</header>

<section class="section register-page">
  <h2>TEAM REGISTRATION</h2>
  <p class="subtitle">Register your team</p>

  <form class="register-form">

    <input type="text" placeholder="Team Name" required>
    
    <input type="text" placeholder="Team Tag (max 5 chars)" required>
    
    <input type="url" placeholder="FACEIT Team Link" required>
    
    <input type="url" placeholder="Team Logo URL">

    <button type="submit">REGISTER TEAM</button>

  </form>

  <div class="info-box">
    <h3>REGISTRATION INFO</h3>
    <ul>
      <li>FACEIT Account required</li>
      <li>Minimum 5 players</li>
      <li>Max 10 Teams</li>
    </ul>
  </div>
</section>

</body>
</html>
